<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나만의 프리미엄 주간 일정표</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { font-family: 'Pretendard', sans-serif; color: #333; min-height: 100vh; }
        
        /* 동적 배경 레이어 */
        #bgLayer {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1;
            background-color: #F8F9FA; /* 기본색 */
            background-size: cover; background-position: center; background-attachment: fixed;
            transition: all 0.5s ease;
        }

        /* 반투명 유리 효과 (가독성 확보) */
        .glass-panel { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.6);
        }

        .completed { background-color: rgba(229, 238, 208, 0.9) !important; }
        .completed-text { text-decoration: line-through; color: #9ca3af; }
        
        input, textarea, select { transition: all 0.2s; cursor: pointer; }
        input:focus, textarea:focus, select:focus { outline: 2px solid #3b82f6; border-color: transparent; }
        
        /* input date/time 전체 영역 클릭 가능하도록 */
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; width: auto; height: auto; color: transparent; background: transparent; cursor: pointer;
        }
    </style>
</head>
<body class="pb-12">

    <!-- 동적 배경 -->
    <div id="bgLayer"></div>

    <!-- 상단 헤더 영역 -->
    <header class="glass-header z-10 sticky top-0 px-4 py-4 flex flex-wrap justify-between items-center gap-3">
        <div class="relative cursor-pointer hover:bg-black/5 px-3 py-2 rounded-xl transition-colors flex-1 min-w-[200px]" onclick="document.getElementById('jumpDateInput').showPicker()">
            <div class="text-xs text-blue-600 font-bold mb-0.5">날짜 선택하기 ▾</div>
            <h1 class="text-xl md:text-2xl font-bold tracking-tight text-gray-800" id="headerTitle">0월 0일 ~ 0월 0일</h1>
            <input type="date" id="jumpDateInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="jumpToDate(this.value)">
        </div>
        <div class="flex gap-1 md:gap-2 items-center">
            <button onclick="changeWeek(-1)" class="p-2 md:p-3 rounded-full hover:bg-black/5 text-gray-700 transition"><i class="ph ph-caret-left text-xl"></i></button>
            <button onclick="goToToday()" class="px-4 py-2 text-sm font-bold rounded-full bg-blue-100 text-blue-700 hover:bg-blue-200 transition shadow-sm">오늘</button>
            <button onclick="changeWeek(1)" class="p-2 md:p-3 rounded-full hover:bg-black/5 text-gray-700 transition"><i class="ph ph-caret-right text-xl"></i></button>
            <div class="w-px h-6 bg-gray-300 mx-1"></div>
            <button onclick="openSettings()" class="p-2 md:p-3 rounded-full hover:bg-black/5 text-gray-700 transition"><i class="ph ph-palette text-xl md:text-2xl"></i></button>
        </div>
    </header>

    <!-- 주간 캘린더 영역 -->
    <main class="p-4 grid grid-cols-1 md:grid-cols-7 gap-4 max-w-[1600px] mx-auto" id="weekContainer">
        <!-- JS를 통해 동적으로 렌더링 됩니다 -->
    </main>

    <!-- 새 일정 추가 / 수정 통합 모달 -->
    <div id="scheduleModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 overflow-y-auto custom-scrollbar">
                <div class="flex justify-between items-center mb-5">
                    <h2 class="text-2xl font-bold text-gray-800" id="modalTitle">새 일정</h2>
                    <button onclick="closeModal()" class="p-2 rounded-full hover:bg-gray-100 text-gray-500"><i class="ph ph-x text-xl"></i></button>
                </div>
                
                <div class="space-y-4">
                    <!-- 날짜/시간 선택 -->
                    <div class="flex gap-3">
                        <div class="relative flex-1">
                            <label class="block text-xs font-bold text-gray-500 mb-1 ml-1">날짜</label>
                            <input type="date" id="scheduleDate" class="w-full p-3.5 rounded-2xl bg-gray-50 border border-gray-200 font-medium text-gray-700" onclick="try{this.showPicker()}catch(e){}">
                        </div>
                        <div class="relative flex-1">
                            <label class="block text-xs font-bold text-gray-500 mb-1 ml-1">시간</label>
                            <input type="time" id="scheduleTime" class="w-full p-3.5 rounded-2xl bg-gray-50 border border-gray-200 font-medium text-gray-700" onclick="try{this.showPicker()}catch(e){}">
                        </div>
                    </div>

                    <!-- 카테고리/제목 -->
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 ml-1">카테고리</label>
                        <select id="scheduleCategory" class="w-full p-3.5 rounded-2xl bg-gray-50 border border-gray-200 text-gray-700 font-medium">
                            <option value="운동">💪 운동</option>
                            <option value="공부">📚 공부</option>
                            <option value="업무">💻 업무</option>
                            <option value="약속">🤝 약속</option>
                            <option value="여행">✈️ 여행</option>
                            <option value="여가">🎮 여가</option>
                            <option value="기타">📌 기타</option>
                           
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 ml-1">일정 내용</label>
                        <input type="text" id="scheduleTitle" placeholder="어떤 일정인가요?" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 font-bold text-lg text-gray-800">
                    </div>

                    <!-- 메모 -->
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 ml-1">상세 메모</label>
                        <textarea id="scheduleMemo" placeholder="필요한 메모를 자유롭게 적어보세요..." class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 h-28 resize-none text-gray-700 leading-relaxed"></textarea>
                    </div>

                    <!-- 사진 첨부 -->
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 ml-1">사진 첨부</label>
                        <div id="imagePreviewContainer" class="hidden mb-2 relative">
                            <img id="imagePreview" src="" alt="첨부 이미지" class="w-full h-40 object-cover rounded-2xl border border-gray-200">
                            <button onclick="removeImage()" class="absolute top-2 right-2 p-1.5 bg-white/80 backdrop-blur rounded-full text-red-500 hover:bg-red-50 transition"><i class="ph ph-trash"></i></button>
                        </div>
                        <input type="file" id="scheduleImage" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                        <button onclick="document.getElementById('scheduleImage').click()" class="w-full py-3 rounded-2xl border-2 border-dashed border-gray-300 text-gray-500 font-medium hover:border-blue-400 hover:text-blue-500 transition flex items-center justify-center gap-2">
                            <i class="ph ph-camera text-xl"></i> 사진 추가하기
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 하단 액션 버튼 -->
            <div class="p-4 bg-gray-50 border-t border-gray-100 flex gap-2" id="modalActions">
                <!-- JS에서 동적으로 버튼 채움 (저장 / 완료 / 삭제 등) -->
            </div>
        </div>
    </div>

    <!-- 배경 설정 모달 -->
    <div id="settingsModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-800">배경 테마 설정</h2>
                <button onclick="closeSettings()" class="p-2 rounded-full hover:bg-gray-100"><i class="ph ph-x text-lg"></i></button>
            </div>
            
            <div class="space-y-6">
                <div>
                    <p class="text-sm font-bold text-gray-500 mb-3">색상 선택</p>
                    <div class="grid grid-cols-4 gap-3">
                        <button onclick="setThemeColor('#F8F9FA')" class="w-full aspect-square rounded-2xl border-2 border-gray-200 bg-[#F8F9FA] hover:scale-105 transition" title="기본(라이트 그레이)"></button>
                        <button onclick="setThemeColor('#FDF4F5')" class="w-full aspect-square rounded-2xl border-2 border-transparent bg-[#FDF4F5] hover:scale-105 transition shadow-sm" title="파스텔 핑크"></button>
                        <button onclick="setThemeColor('#F0F7FA')" class="w-full aspect-square rounded-2xl border-2 border-transparent bg-[#F0F7FA] hover:scale-105 transition shadow-sm" title="파스텔 블루"></button>
                        <button onclick="setThemeColor('#F4F9F4')" class="w-full aspect-square rounded-2xl border-2 border-transparent bg-[#F4F9F4] hover:scale-105 transition shadow-sm" title="파스텔 그린"></button>
                        <button onclick="setThemeColor('#FFFBEA')" class="w-full aspect-square rounded-2xl border-2 border-transparent bg-[#FFFBEA] hover:scale-105 transition shadow-sm" title="파스텔 옐로우"></button>
                        <button onclick="setThemeColor('#D8DFD0')" class="w-full aspect-square rounded-2xl border-2 border-transparent bg-[#D8DFD0] hover:scale-105 transition shadow-sm" title="차분한 카키"></button>
                        <button onclick="setThemeColor('#2C3E50')" class="w-full aspect-square rounded-2xl border-2 border-transparent bg-[#2C3E50] hover:scale-105 transition shadow-sm" title="딥 네이비"></button>
                        <button onclick="setThemeColor('#EAE8E3')" class="w-full aspect-square rounded-2xl border-2 border-transparent bg-[#EAE8E3] hover:scale-105 transition shadow-sm" title="웜 샌드"></button>
                    </div>
                </div>

                <div class="pt-4 border-t border-gray-100">
                    <p class="text-sm font-bold text-gray-500 mb-3">내 사진으로 배경 설정</p>
                    <input type="file" id="bgImageUpload" accept="image/*" class="hidden" onchange="handleBgImageUpload(event)">
                    <button onclick="document.getElementById('bgImageUpload').click()" class="w-full py-3.5 rounded-2xl bg-gray-100 text-gray-700 font-bold hover:bg-gray-200 transition flex items-center justify-center gap-2">
                        <i class="ph ph-image text-xl"></i> 사진 앨범에서 선택
                    </button>
                    <button onclick="resetBackground()" class="w-full py-2 mt-2 text-sm text-gray-400 hover:text-gray-600 transition">기본 배경으로 초기화</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 전역 변수 설정
        let schedules = JSON.parse(localStorage.getItem('my_schedules')) || [];
        let currentDisplayDate = new Date();
        let currentEditingId = null; // null이면 새 일정, 값이 있으면 수정
        let currentAttachedImage = null; // 첨부된 이미지 Base64 임시 저장

        const categoryConfig = { 
            '운동': '#f97316', '공부': '#22c55e', '업무': '#3b82f6', 
            '약속': '#f43f5e', '여행': '#0ea5e9', '여가': '#ec4899', '기타': '#8b5cf6' 
        };

        // 초기 테마 설정
        applySavedTheme();

        function renderWeek() {
            const container = document.getElementById('weekContainer');
            container.innerHTML = '';
            
            // 기준일을 현재 currentDisplayDate로 설정 (무조건 여기서부터 7일)
            const start = new Date(currentDisplayDate);
            const end = new Date(start); 
            end.setDate(start.getDate() + 6);
            
            document.getElementById('headerTitle').textContent = `${start.getMonth()+1}월 ${start.getDate()}일 ~ ${end.getMonth()+1}월 ${end.getDate()}일`;
            
            for (let i = 0; i < 7; i++) {
                const d = new Date(start); 
                d.setDate(start.getDate() + i);
                
                // 날짜 포맷팅 (YYYY-MM-DD)
                const offset = d.getTimezoneOffset() * 60000;
                const iso = (new Date(d - offset)).toISOString().split('T')[0];
                
                const daySchedules = schedules
                    .filter(s => s.date === iso)
                    .sort((a,b) => (a.completed - b.completed) || a.time.localeCompare(b.time));
                
                const isToday = new Date().toDateString() === d.toDateString();
                const dayNames = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
                const dayColor = d.getDay() === 0 ? 'text-red-500' : (d.getDay() === 6 ? 'text-blue-500' : 'text-gray-600');
                
                // 칸을 넓게 쓰기 위해 min-h-[250px], padding 증가, 글래스 패널 적용
                const dayCol = document.createElement('div');
                dayCol.className = `glass-panel flex flex-col gap-3 min-h-[250px] p-4 md:p-5 rounded-3xl transition-all ${isToday ? 'ring-2 ring-blue-400 bg-blue-50/40' : ''}`;
                
                dayCol.innerHTML = `
                    <div class="flex justify-between items-end mb-2 border-b border-gray-200/50 pb-2">
                        <span class="text-3xl font-black ${isToday ? 'text-blue-600' : 'text-gray-800'}">${d.getDate()}</span>
                        <span class="text-sm font-bold ${isToday ? 'text-blue-600' : dayColor}">${dayNames[d.getDay()]}</span>
                    </div>
                `;
                
                daySchedules.forEach(s => {
                    const item = document.createElement('div');
                    item.className = `group p-3.5 rounded-2xl bg-white/90 border border-gray-100 cursor-pointer shadow-sm hover:shadow-md transition-all ${s.completed ? 'completed' : ''}`;
                    item.onclick = () => openScheduleModal(iso, s.id);
                    
                    const hasImage = s.image ? `<i class="ph-fill ph-image text-gray-400 ml-1"></i>` : '';
                    const hasMemo = s.memo ? `<i class="ph-fill ph-text-align-left text-gray-400 ml-1"></i>` : '';
                    
                    item.innerHTML = `
                        <div class="flex justify-between items-start mb-1.5">
                            <div class="flex items-center gap-1.5">
                                <div class="w-2.5 h-2.5 rounded-full shadow-sm" style="background:${categoryConfig[s.category] || categoryConfig['기타']}"></div>
                                <span class="text-xs font-bold text-gray-500 tracking-tight">${s.time}</span>
                            </div>
                            <div class="flex gap-0.5 text-xs">${hasImage}${hasMemo}</div>
                        </div>
                        <div class="text-[15px] font-bold leading-snug break-words text-gray-800 ${s.completed ? 'completed-text' : ''}">${s.title}</div>
                    `;
                    dayCol.appendChild(item);
                });

                const addBtn = document.createElement('button');
                addBtn.className = "mt-auto pt-2 pb-1 w-full rounded-xl text-gray-400 hover:bg-black/5 flex justify-center transition items-center gap-1 font-medium text-sm";
                addBtn.innerHTML = `<i class="ph ph-plus-circle text-lg"></i> 일정 추가`;
                addBtn.onclick = () => openScheduleModal(iso);
                dayCol.appendChild(addBtn);
                
                container.appendChild(dayCol);
            }
        }

        // 새 일정 추가 & 상세 수정 통합 모달 열기
        function openScheduleModal(dateStr, scheduleId = null) {
            currentEditingId = scheduleId;
            currentAttachedImage = null;
            document.getElementById('imagePreviewContainer').classList.add('hidden');
            
            const modalTitle = document.getElementById('modalTitle');
            const dateInput = document.getElementById('scheduleDate');
            const timeInput = document.getElementById('scheduleTime');
            const categoryInput = document.getElementById('scheduleCategory');
            const titleInput = document.getElementById('scheduleTitle');
            const memoInput = document.getElementById('scheduleMemo');
            const actionsContainer = document.getElementById('modalActions');
            
            if (scheduleId) {
                // 기존 일정 수정 모드
                const s = schedules.find(x => x.id === scheduleId);
                modalTitle.textContent = "일정 상세";
                dateInput.value = s.date;
                timeInput.value = s.time;
                categoryInput.value = s.category;
                titleInput.value = s.title;
                memoInput.value = s.memo || "";
                
                if (s.image) {
                    currentAttachedImage = s.image;
                    document.getElementById('imagePreview').src = s.image;
                    document.getElementById('imagePreviewContainer').classList.remove('hidden');
                }

                // 수정 모드 하단 버튼 구성
                const completeBtnClass = s.completed 
                    ? "bg-gray-200 text-gray-700 hover:bg-gray-300" 
                    : "bg-green-100 text-green-700 hover:bg-green-200";
                const completeBtnText = s.completed ? "완료 취소" : "일정 완료";

                actionsContainer.innerHTML = `
                    <button onclick="deleteSchedule()" class="p-4 rounded-2xl bg-red-50 text-red-500 hover:bg-red-100 transition flex items-center justify-center"><i class="ph ph-trash text-xl"></i></button>
                    <button onclick="toggleComplete()" class="flex-1 p-4 rounded-2xl font-bold transition ${completeBtnClass}">${completeBtnText}</button>
                    <button onclick="saveSchedule()" class="flex-[1.5] p-4 rounded-2xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition shadow-md shadow-blue-200">변경 저장</button>
                `;
            } else {
                // 새 일정 추가 모드
                modalTitle.textContent = "새 일정 추가";
                dateInput.value = dateStr;
                timeInput.value = "09:00";
                categoryInput.value = "기타";
                titleInput.value = "";
                memoInput.value = "";
                
                // 추가 모드 하단 버튼 구성
                actionsContainer.innerHTML = `
                    <button onclick="closeModal()" class="flex-1 p-4 rounded-2xl bg-gray-100 text-gray-600 font-bold hover:bg-gray-200 transition">취소</button>
                    <button onclick="saveSchedule()" class="flex-[2] p-4 rounded-2xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition shadow-md shadow-blue-200">저장하기</button>
                `;
                
                setTimeout(() => titleInput.focus(), 100);
            }
            
            document.getElementById('scheduleModal').classList.remove('hidden');
        }

        // 일정 저장 (추가/수정 통합)
        function saveSchedule() {
            const date = document.getElementById('scheduleDate').value;
            const title = document.getElementById('scheduleTitle').value.trim();
            if(!date) return alert("날짜를 선택해주세요.");
            if(!title) return alert("일정 내용을 입력해주세요.");
            
            if (currentEditingId) {
                // 수정
                const s = schedules.find(x => x.id === currentEditingId);
                s.date = date;
                s.time = document.getElementById('scheduleTime').value || "00:00";
                s.category = document.getElementById('scheduleCategory').value;
                s.title = title;
                s.memo = document.getElementById('scheduleMemo').value;
                s.image = currentAttachedImage;
            } else {
                // 새 추가
                schedules.push({
                    id: Date.now().toString(), 
                    date: date, 
                    time: document.getElementById('scheduleTime').value || "09:00", 
                    category: document.getElementById('scheduleCategory').value, 
                    title: title, 
                    memo: document.getElementById('scheduleMemo').value,
                    image: currentAttachedImage,
                    completed: false
                });
            }
            saveData();
            closeModal();
        }

        function toggleComplete() {
            const s = schedules.find(x => x.id === currentEditingId);
            if(s) {
                s.completed = !s.completed;
                saveData();
                openScheduleModal(s.date, s.id); // 버튼 상태 갱신을 위해 다시 렌더
            }
        }

        function deleteSchedule() {
            if(confirm("이 일정을 정말 삭제할까요?")) {
                schedules = schedules.filter(x => x.id !== currentEditingId);
                saveData();
                closeModal();
            }
        }

        function saveData() { 
            localStorage.setItem('my_schedules', JSON.stringify(schedules)); 
            renderWeek(); 
        }

        // 모달 닫기
        function closeModal() { document.getElementById('scheduleModal').classList.add('hidden'); }
        function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }
        function openSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }

        // 주간 이동 및 날짜 점프
        function changeWeek(offset) { 
            currentDisplayDate.setDate(currentDisplayDate.getDate() + (offset * 7)); 
            renderWeek(); 
        }
        
        function goToToday() { 
            currentDisplayDate = new Date(); 
            renderWeek(); 
        }
        
        function jumpToDate(val) { 
            if(val) {
                currentDisplayDate = new Date(val); 
                renderWeek(); 
            }
        }

        // --- 이미지 첨부 압축 로직 ---
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // 캔버스를 이용한 이미지 리사이징 및 압축 (로컬 스토리지 용량 보호)
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // JPEG 70% 품질로 압축
                    currentAttachedImage = canvas.toDataURL('image/jpeg', 0.7);
                    
                    document.getElementById('imagePreview').src = currentAttachedImage;
                    document.getElementById('imagePreviewContainer').classList.remove('hidden');
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
            event.target.value = ''; // 같은 파일 재선택 가능하게 초기화
        }

        function removeImage() {
            currentAttachedImage = null;
            document.getElementById('imagePreviewContainer').classList.add('hidden');
            document.getElementById('imagePreview').src = '';
        }

        // --- 배경 테마 설정 로직 ---
        function applySavedTheme() {
            const bgData = localStorage.getItem('appBgLayer');
            if (bgData) {
                if (bgData.startsWith('#')) {
                    document.getElementById('bgLayer').style.backgroundColor = bgData;
                    document.getElementById('bgLayer').style.backgroundImage = 'none';
                } else {
                    document.getElementById('bgLayer').style.backgroundImage = `url(${bgData})`;
                    document.getElementById('bgLayer').style.backgroundColor = 'transparent';
                }
            }
        }

        function setThemeColor(hexCode) {
            localStorage.setItem('appBgLayer', hexCode);
            applySavedTheme();
            closeSettings();
        }

        function handleBgImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    // 배경은 조금 더 크게 허용
                    const MAX_WIDTH = 1200; 
                    let width = img.width; let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const bgBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    localStorage.setItem('appBgLayer', bgBase64);
                    applySavedTheme();
                    closeSettings();
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function resetBackground() {
            localStorage.removeItem('appBgLayer');
            document.getElementById('bgLayer').style.backgroundColor = '#F8F9FA';
            document.getElementById('bgLayer').style.backgroundImage = 'none';
            closeSettings();
        }

        // 모달 외부 클릭 시 닫기
        window.onclick = function(event) {
            if (event.target == document.getElementById('scheduleModal')) closeModal();
            if (event.target == document.getElementById('settingsModal')) closeSettings();
        }

        // 초기 실행
        window.onload = renderWeek;
    </script>
</body>
</html>
